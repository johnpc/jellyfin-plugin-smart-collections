name: Build and Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 9.0.x
    
    - name: Restore dependencies
      run: dotnet restore Jellyfin.Plugin.SmartCollections.sln
    
    - name: Build
      run: dotnet build Jellyfin.Plugin.SmartCollections.sln --configuration Release --no-restore /p:TreatWarningsAsErrors=false /p:Version=${{ steps.get_version.outputs.VERSION }} /p:AssemblyVersion=${{ steps.get_version.outputs.VERSION }} /p:FileVersion=${{ steps.get_version.outputs.VERSION }}
    
    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
    
    - name: Create release directory
      run: |
        mkdir -p release
        find . -path "*/bin/Release/net9.0/*.dll" -exec cp {} release/ \;
    
    - name: Create zip file
      run: |
        cd release
        zip -r ../jellyfin-plugin-smart-collections-${{ steps.get_version.outputs.VERSION }}.zip .
        cd ..
    
    - name: Calculate checksum
      id: calculate_checksum
      run: |
        CHECKSUM=$(md5sum jellyfin-plugin-smart-collections-${{ steps.get_version.outputs.VERSION }}.zip | awk '{ print $1 }')
        echo "CHECKSUM=$CHECKSUM" >> $GITHUB_OUTPUT
    
    - name: Create manifest.json
      run: |
        cat > manifest.json << MANIFEST_EOF
        [
          {
            "guid": "09612e52-0f93-41ab-a6ab-5a19479f5315",
            "name": "Smart Collections",
            "overview": "Enables creation of Smart Collections based on Tag",
            "description": "Enables creation of Smart Collections based on Tag",
            "owner": "jellyfin-plugin-smart-collections",
            "category": "General",
            "versions": [
              {
                "version": "${{ steps.get_version.outputs.VERSION }}",
                "changelog": "See the full changelog at [GitHub](https://github.com/johnpc/jellyfin-plugin-smart-collections/releases/tag/${{ steps.get_version.outputs.VERSION }})",
                "targetAbi": "10.11.0.0",
                "sourceUrl": "https://github.com/johnpc/jellyfin-plugin-smart-collections/releases/download/${{ steps.get_version.outputs.VERSION }}/jellyfin-plugin-smart-collections-${{ steps.get_version.outputs.VERSION }}.zip",
                "checksum": "${{ steps.calculate_checksum.outputs.CHECKSUM }}",
                "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
              }
            ]
          }
        ]
        MANIFEST_EOF
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          jellyfin-plugin-smart-collections-${{ steps.get_version.outputs.VERSION }}.zip
          manifest.json
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Update manifest on main
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git fetch origin main
        git checkout main
        cp manifest.json manifest.json
        git add manifest.json
        git commit -m "chore: update manifest for ${{ steps.get_version.outputs.VERSION }}" || true
        git push origin main
